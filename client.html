<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Client Portal</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link href="css/client.css" />
  </head>

  <body class="bg-light">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Client Portal</h1>
            <span class="badge text-bg-secondary">View Reports</span>
          </div>

          <div id="alertBox" class="alert d-none" role="alert"></div>

          <!-- AUTH CARD -->
          <div class="card mb-3">
            <div class="card-body">
              <div class="row g-2 align-items-center">
                <div class="d-none">
                  <label class="form-label">API Base URL</label>
                  <input
                    id="apiBase"
                    class="form-control"
                    value="https://api.siteman.cessar.tech"
                  />
                  <!-- value="http://127.0.0.1:3330" -->
                </div>

                <div class="col-md-5">
                  <label class="form-label">Access Code</label>
                  <input
                    id="codeInput"
                    class="form-control mono"
                    placeholder="ABCDE-FGHIJ"
                  />
                  <div class="form-text">
                    Enter the code provided by your contractor.
                  </div>
                </div>

                <div class="col-md-3 d-grid">
                  <button id="authBtn" class="btn btn-primary">Unlock</button>
                </div>

                <div class="d-none">
                  <button
                    id="loadSavedBtn"
                    class="btn btn-outline-secondary btn-sm"
                  >
                    Use saved session
                  </button>
                  <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                    Log out
                  </button>
                  <span
                    id="sessionHint"
                    class="muted small align-self-center"
                  ></span>
                </div>
              </div>
            </div>
          </div>

          <div class="row g-3">
            <!-- LEFT: REPORTS LIST -->
            <div class="col-lg-5">
              <div class="card sticky-top-lite">
                <div
                  class="card-header d-flex align-items-center justify-content-between"
                >
                  <span>Report</span>
                  <button
                    id="refreshReportsBtn"
                    class="btn btn-sm btn-outline-primary"
                  >
                    Refresh
                  </button>
                </div>
                <div class="card-body">
                  <div
                    id="siteInfo"
                    class="mb-2 muted medium fw-semibold"
                  ></div>
                  <div class="muted fw-semibold">Total Job Progress</div>
                  <div class="mb-4 progress" style="height: 28px">
                    <div
                      id="progressBar"
                      class="progress-bar"
                      role="progressbar"
                      style="width: 0%"
                    >
                      0%
                    </div>
                  </div>
                  <div class="mb-2 fw-semibold">Detailed Report</div>

                  <div id="reportsList" class="list-group"></div>
                  <div id="reportsEmpty" class="muted small mt-2 d-none">
                    No reports yet.
                  </div>
                </div>
              </div>
            </div>

            <!-- RIGHT: REPORT DETAIL -->
            <div class="d-none">
              <div class="card">
                <div class="card-header">Report Detail</div>
                <div class="card-body">
                  <div id="reportDetailEmpty" class="muted">
                    Unlock with your code, then select a report.
                  </div>

                  <div id="reportDetail" class="d-none">
                    <div
                      class="d-flex align-items-center justify-content-between"
                    >
                      <div>
                        <div class="h5 mb-1" id="reportTitle">Report</div>
                        <div class="muted small" id="reportMeta"></div>
                      </div>
                      <div class="text-end">
                        <div class="small muted">Progress</div>
                        <div class="h5 mb-0">
                          <span id="progressValue">0</span>%
                        </div>
                      </div>
                    </div>

                    <div class="progress my-3" style="height: 22px">
                      <div
                        id="progressBar"
                        class="progress-bar"
                        style="width: 0%"
                      >
                        0%
                      </div>
                    </div>

                    <div id="blocksContainer" class="d-grid gap-3"></div>
                  </div>

                  <pre
                    id="rawDebug"
                    class="mono small mt-3 d-none"
                    style="white-space: pre-wrap"
                  ></pre>
                </div>
              </div>
            </div>
          </div>

          <!-- <div class="text-center muted small mt-4">
            This page stores a client token in
            <span class="mono">localStorage.clientToken</span>.
          </div> -->
        </div>
      </div>
    </div>
  </body>
  <script src="js/client.js"></script>
</html>
